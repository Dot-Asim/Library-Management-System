# ==============================================================================
# ULMS — Docker Compose: Full Infrastructure Stack
# ==============================================================================
# Usage:
#   docker compose up -d                    → Start all infrastructure
#   docker compose down                     → Stop all
#   docker compose down -v                  → Stop + delete data volumes
#   docker compose logs -f rabbitmq         → Follow rabbitmq logs
# ==============================================================================

services:
  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL 16 — Database for all microservices
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ulms-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ulms_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ulms_secret_2026}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ulms_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ulms-network

  # ────────────────────────────────────────────────────────────────────────────
  # Redis 7 — Caching, JWT refresh tokens, rate limiting
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ulms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-ulms_redis_2026}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ulms_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ulms-network

  # ────────────────────────────────────────────────────────────────────────────
  # RabbitMQ 3 — Event-driven message broker
  # ────────────────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ulms-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-ulms}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-ulms_rabbit_2026}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ulms-network

  # ────────────────────────────────────────────────────────────────────────────
  # pgAdmin 4 — Database management UI
  # ────────────────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ulms-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ulms.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ulms-network

# ────────────────────────────────────────────────────────────────────────────
# Volumes — Persist data across container restarts
# ────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: ulms_postgres_data
  redis_data:
    name: ulms_redis_data
  rabbitmq_data:
    name: ulms_rabbitmq_data
  pgadmin_data:
    name: ulms_pgadmin_data

# ────────────────────────────────────────────────────────────────────────────
# Network — All services on same bridge network
# ────────────────────────────────────────────────────────────────────────────
networks:
  ulms-network:
    name: ulms-network
    driver: bridge
